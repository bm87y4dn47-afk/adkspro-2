 <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADX Pro | Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080a0e; --card: #12171f; --nav: #0f1218;
            --text: #e0e0e0; --accent: #00ff99; --danger: #ff4d4d;
            --warning: #ffaa00; --border: rgba(255,255,255,0.08);
            --muted: rgba(255,255,255,0.4);
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #0d1f17 0%, #080a0e 70%); }
        .login-box { background: var(--card); border: 1px solid rgba(0,255,153,0.2); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 0 60px rgba(0,255,153,0.05); }
        .login-logo { text-align: center; font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
        .login-subtitle { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .field input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: 0.2s; }
        .field input:focus { border-color: var(--accent); background: rgba(0,255,153,0.03); }

        .login-err { background: rgba(255,77,77,0.1); border: 1px solid var(--danger); color: var(--danger); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }

        .btn { width: 100%; padding: 13px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-danger { background: var(--danger) !important; color: #fff !important; }
        .btn-sm { width: auto; padding: 7px 14px; font-size: 12px; border-radius: 6px; }

        #adminPanel { display: none; }
        .topbar { background: var(--nav); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .topbar-logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; }
        .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 13px; }
        .badge { background: rgba(0,255,153,0.15); color: var(--accent); border: 1px solid rgba(0,255,153,0.3); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }

        .content { padding: 24px 28px; max-width: 1200px; margin: 0 auto; }

        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .stat-value { font-size: 26px; font-weight: 800; }
        .stat-value.green { color: var(--accent); }

        .panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
        .card-title { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

        .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-row input { flex: 1; padding: 11px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; transition: 0.2s; }
        .input-row input:focus { border-color: var(--accent); }

        .result-box { background: rgba(0,255,153,0.06); border: 1px solid rgba(0,255,153,0.2); border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-top: 10px; display: none; }
        .result-box.error { background: rgba(255,77,77,0.08); border-color: rgba(255,77,77,0.3); color: var(--danger); }

        .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .table-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .search-box { padding: 8px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 12px; outline: none; width: 200px; transition: 0.2s; }
        .search-box:focus { border-color: var(--accent); width: 260px; }

        table { width: 100%; border-collapse: collapse; }
        thead th { padding: 12px 18px; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.01); }
        tbody tr { transition: 0.15s; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }
        tbody td { padding: 14px 18px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .uid-badge { background: rgba(0,255,153,0.1); color: var(--accent); border: 1px solid rgba(0,255,153,0.2); padding: 3px 8px; border-radius: 6px; font-size: 11px; font-family: monospace; font-weight: 700; }
        .pass-cell { font-family: monospace; font-size: 10px; color: rgba(255,255,255,0.3); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
        .pass-cell:hover { color: var(--text); }
        .balance-cell { color: var(--accent); font-weight: 700; font-family: monospace; }
        .date-cell { color: var(--muted); font-size: 12px; }

        .empty-state { text-align: center; padding: 50px; color: var(--muted); font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: var(--muted); }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        #toast { position: fixed; bottom: 30px; right: 24px; z-index: 9999; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; }
        #toast.success { background: rgba(0,255,153,0.15); border: 1px solid var(--accent); color: var(--accent); }
        #toast.danger  { background: rgba(255,77,77,0.15);  border: 1px solid var(--danger);  color: var(--danger); }

        @media (max-width: 900px) { .stats { grid-template-columns: 1fr 1fr; } .panel-row { grid-template-columns: 1fr; } .content { padding: 16px; } }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <div class="login-logo">ADX<span style="color:var(--accent)">PRO</span></div>
        <div class="login-subtitle">Admin Panel</div>
        <div id="loginErr" class="login-err">E-posta veya şifre hatalı!</div>
        <div class="field">
            <label>E-posta</label>
            <input type="email" id="adminEmail" placeholder="admin@adxpro.com" onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <div class="field">
            <label>Şifre</label>
            <input type="password" id="adminPass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <button class="btn" onclick="doLogin()">Giriş Yap</button>
    </div>
</div>

<div id="adminPanel">
    <div class="topbar">
        <div class="topbar-logo">ADX<span style="color:var(--accent)">PRO</span>
            <span style="font-size:13px; font-weight:400; color:var(--muted); margin-left:6px;">Admin Panel</span>
        </div>
        <div class="topbar-right">
            <span><span class="status-dot"></span>Canlı</span>
            <span id="adminName" class="badge">Admin</span>
            <button class="btn btn-sm btn-danger" onclick="doLogout()">Çıkış</button>
        </div>
    </div>

    <div class="content">
        <div class="stats">
            <div class="stat-card"><div class="stat-label">Toplam Kullanıcı</div><div class="stat-value green" id="statTotal">—</div></div>
            <div class="stat-card"><div class="stat-label">Toplam Bakiye</div><div class="stat-value" id="statBalance">—</div></div>
            <div class="stat-card"><div class="stat-label">Bugün Kayıt</div><div class="stat-value green" id="statToday">—</div></div>
            <div class="stat-card"><div class="stat-label">Son Güncelleme</div><div class="stat-value" style="font-size:14px; padding-top:6px;" id="statTime">—</div></div>
        </div>

        <div class="panel-row">
            <div class="card">
                <div class="card-title">💰 Bakiye Yükselt / Düşür</div>
                <div class="input-row"><input type="text" id="balUid" placeholder="Kullanıcı ID (ADX-XXXX-XXXX)"></div>
                <div class="input-row">
                    <input type="number" id="balAmount" placeholder="Miktar (+ ekle / − çıkar)">
                    <button class="btn btn-sm" onclick="updateBalance()">Uygula</button>
                </div>
                <div id="balResult" class="result-box"></div>
            </div>
            <div class="card">
                <div class="card-title">🔍 Kullanıcı Bilgisi</div>
                <div class="input-row">
                    <input type="text" id="lookupUid" placeholder="ID veya E-posta ile ara" onkeydown="if(event.key==='Enter') lookupUser()">
                    <button class="btn btn-sm" onclick="lookupUser()">Ara</button>
                </div>
                <div id="lookupResult" class="result-box"></div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">
                <div class="card-title" style="margin:0;">👥 Tüm Kullanıcılar</div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="text" class="search-box" placeholder="🔍 Ara..." oninput="filterTable(this.value)">
                    <button class="btn btn-sm" onclick="loadUsers()">↻ Yenile</button>
                </div>
            </div>
            <div id="tableBody"><div class="loading"><span class="spinner"></span>Yükleniyor...</div></div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const ADMIN_EMAIL    = "hazalaksoy2727@hotmail.com";
    const ADMIN_PASSWORD = "Hazal@27";
    const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:3001'
        : 'https://adkspro-2.onrender.com';
    const API = `${API_BASE}/api`;

    let allUsers = [];

    // ── TOAST ────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'show ' + type;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { el.className = ''; }, 3000);
    }

    // ── GİRİŞ / ÇIKIŞ ───────────────────────────────────────────────────
    function doLogin() {
        const email = document.getElementById('adminEmail').value.trim();
        const pass  = document.getElementById('adminPass').value;
        if (email === ADMIN_EMAIL && pass === ADMIN_PASSWORD) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display  = 'block';
            document.getElementById('adminName').textContent = email.split('@')[0];
            loadUsers();
        } else {
            document.getElementById('loginErr').style.display = 'block';
        }
    }

    function doLogout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminPanel').style.display  = 'none';
        document.getElementById('adminEmail').value = '';
        document.getElementById('adminPass').value  = '';
        document.getElementById('loginErr').style.display = 'none';
    }

    // ── KULLANICILARI YÜKLE ──────────────────────────────────────────────
    async function loadUsers() {
        document.getElementById('tableBody').innerHTML = '<div class="loading"><span class="spinner"></span>Yükleniyor...</div>';
        try {
            const res = await fetch(`${API}/admin/users`);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            allUsers = await res.json();
            renderStats(allUsers);
            renderTable(allUsers);
            document.getElementById('statTime').textContent = new Date().toLocaleTimeString('tr-TR');
        } catch(e) {
            document.getElementById('tableBody').innerHTML =
                '<div class="empty-state">⚠️ Sunucuya bağlanılamadı.<br><small>server.js çalışıyor mu?</small></div>';
        }
    }

    // ── İSTATİSTİKLER ───────────────────────────────────────────────────
    function renderStats(users) {
        const total   = users.length;
        const balance = users.reduce((s, u) => s + (parseFloat(u.balance) || 0), 0);
        const assets  = users.reduce((s, u) => s + (parseFloat(u.assets) || 0), 0);
        const todayStr = new Date().toISOString().slice(0, 10);
        const today   = users.filter(u => u.createdAt && u.createdAt.startsWith(todayStr)).length;
        document.getElementById('statTotal').textContent   = total;
        document.getElementById('statBalance').textContent = '$' + (balance + assets).toLocaleString('tr-TR', { minimumFractionDigits: 2 });
        document.getElementById('statToday').textContent   = today;
    }

    // ── XSS KORUMALARI ──────────────────────────────────────────────────
    function escHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) { return String(str).replace(/'/g,"\\'"); }

    // ── TABLO RENDER ────────────────────────────────────────────────────
    function renderTable(users) {
        if (!users.length) {
            document.getElementById('tableBody').innerHTML = '<div class="empty-state">Henüz kayıtlı kullanıcı yok.</div>';
            return;
        }
        const rows = users.map((u, i) => `
            <tr id="row-${u.uid}">
                <td style="color:var(--muted);font-size:12px;">${i + 1}</td>
                <td><span class="uid-badge">${escHtml(u.uid)}</span></td>
                <td><b>${escHtml(u.fullName)}</b></td>
                <td style="color:var(--muted);">${escHtml(u.email)}</td>
                <td class="pass-cell"
                    onclick="navigator.clipboard.writeText('${escAttr(u.password || '')}').then(()=>showToast('Hash kopyalandı'))"
                    title="Kopyalamak için tıkla">
                    ${u.password ? u.password.slice(0, 20) + '…' : '—'}
                </td>
                <td class="balance-cell" id="bal-${u.uid}">
                    $${parseFloat(u.balance || 0).toLocaleString('tr-TR', { minimumFractionDigits: 2 })}
                </td>
                <td class="balance-cell">
                    $${parseFloat(u.assets || 0).toLocaleString('tr-TR', { minimumFractionDigits: 2 })}
                </td>
                <td class="date-cell">${u.createdAt ? u.createdAt.replace('T',' ').slice(0,16) : '—'}</td>
                <td>
                    <div style="display:flex;gap:5px;">
                        <button onclick="zeroBalance('${escAttr(u.uid)}')"
                            style="padding:4px 8px;font-size:11px;background:rgba(255,170,0,0.15);border:1px solid #ffaa00;color:#ffaa00;border-radius:5px;cursor:pointer;"
                            title="Bakiyeyi Sıfırla">$0</button>
                        <button onclick="deleteUser('${escAttr(u.uid)}','${escAttr(u.fullName)}')"
                            style="padding:4px 8px;font-size:11px;background:rgba(255,77,77,0.15);border:1px solid var(--danger);color:var(--danger);border-radius:5px;cursor:pointer;"
                            title="Kullanıcıyı Sil">🗑</button>
                    </div>
                </td>
            </tr>`).join('');

        document.getElementById('tableBody').innerHTML = `
            <table>
                <thead><tr>
                    <th>#</th><th>Kullanıcı ID</th><th>Ad Soyad</th><th>E-posta</th>
                    <th>Şifre (hash)</th><th>Bakiye</th><th>Varlık</th><th>Kayıt Tarihi</th><th>İşlemler</th>
                </tr></thead>
                <tbody id="userRows">${rows}</tbody>
            </table>`;
    }

    function filterTable(val) {
        const q = val.toUpperCase();
        const filtered = allUsers.filter(u =>
            u.uid.toUpperCase().includes(q) ||
            u.fullName.toUpperCase().includes(q) ||
            u.email.toUpperCase().includes(q)
        );
        renderTable(filtered);
    }

    // ── BAKİYE GÜNCELLE (±) ─────────────────────────────────────────────
    async function updateBalance() {
        const uid    = document.getElementById('balUid').value.trim();
        const amount = parseFloat(document.getElementById('balAmount').value);
        const resEl  = document.getElementById('balResult');

        if (!uid || isNaN(amount)) {
            resEl.className = 'result-box error';
            resEl.style.display = 'block';
            resEl.textContent = '⚠️ ID ve miktar giriniz.';
            return;
        }

        try {
            const r    = await fetch(`${API}/users/${uid}/balance`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount })
            });
            const data = await r.json();
            if (r.ok) {
                resEl.className = 'result-box';
                resEl.style.display = 'block';
                resEl.innerHTML = `✅ <b>${escHtml(uid)}</b> — Yeni bakiye: <b>$${parseFloat(data.balance).toLocaleString('tr-TR',{minimumFractionDigits:2})}</b>`;
                const balEl = document.getElementById(`bal-${uid}`);
                if (balEl) balEl.textContent = '$' + parseFloat(data.balance).toLocaleString('tr-TR',{minimumFractionDigits:2});
                showToast('✅ Bakiye güncellendi!', 'success');
                loadUsers();
            } else {
                resEl.className = 'result-box error';
                resEl.style.display = 'block';
                resEl.textContent = '❌ ' + (data.message || 'Hata oluştu.');
            }
        } catch(e) {
            resEl.className = 'result-box error';
            resEl.style.display = 'block';
            resEl.textContent = '❌ Sunucuya bağlanılamadı.';
        }
    }

    // ── BAKİYEYİ SIFIRLA ────────────────────────────────────────────────
    // DÜZELTME: /setbalance endpoint'i kullanılıyor (eski kodda yoktu)
    async function zeroBalance(uid) {
        if (!confirm(`${uid} kullanıcısının bakiyesini sıfırlamak istiyor musunuz?`)) return;
        try {
            const r = await fetch(`${API}/users/${uid}/setbalance`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ balance: 0 })
            });
            const data = await r.json();
            if (r.ok) {
                const balEl = document.getElementById(`bal-${uid}`);
                if (balEl) balEl.textContent = '$0.00';
                showToast('⚠️ Bakiye sıfırlandı.', 'danger');
                loadUsers();
            } else {
                showToast('❌ ' + (data.message || 'Hata!'), 'danger');
            }
        } catch(e) {
            showToast('❌ Sunucu hatası!', 'danger');
        }
    }

    // ── KULLANICI SİL ────────────────────────────────────────────────────
    // DÜZELTME: DELETE endpoint'i eski server.js'de yoktu, yeni server.js'e eklendi
    async function deleteUser(uid, name) {
        if (!confirm(`"${name}" kullanıcısını silmek istediğinize emin misiniz?\nBu işlem geri alınamaz!`)) return;
        try {
            const r    = await fetch(`${API}/users/${uid}`, { method: 'DELETE' });
            const data = await r.json();
            if (r.ok) {
                const row = document.getElementById(`row-${uid}`);
                if (row) row.remove();
                showToast(`🗑 ${name} silindi.`, 'danger');
                loadUsers();
            } else {
                showToast('❌ ' + (data.message || 'Hata!'), 'danger');
            }
        } catch(e) {
            showToast('❌ Sunucu hatası!', 'danger');
        }
    }

    // ── KULLANICI ARA ────────────────────────────────────────────────────
    function lookupUser() {
        const q   = document.getElementById('lookupUid').value.trim().toUpperCase();
        const res = document.getElementById('lookupResult');
        const u   = allUsers.find(x =>
            x.uid.toUpperCase() === q ||
            x.email.toUpperCase() === q.toLowerCase()
        );
        if (u) {
            res.className = 'result-box';
            res.style.display = 'block';
            res.innerHTML = `
                <div style="margin-bottom:4px;"><span class="uid-badge">${escHtml(u.uid)}</span></div>
                <div><b>${escHtml(u.fullName)}</b> — ${escHtml(u.email)}</div>
                <div style="margin-top:4px;">Bakiye: <b style="color:var(--accent)">$${parseFloat(u.balance||0).toLocaleString('tr-TR',{minimumFractionDigits:2})}</b></div>
                <div style="margin-top:4px;">Varlık: <b style="color:var(--accent)">$${parseFloat(u.assets||0).toLocaleString('tr-TR',{minimumFractionDigits:2})}</b></div>
                <div style="font-size:11px; color:var(--muted); margin-top:4px;">Kayıt: ${u.createdAt ? u.createdAt.slice(0,10) : '—'}</div>
            `;
        } else {
            res.className = 'result-box error';
            res.style.display = 'block';
            res.textContent = '❌ Kullanıcı bulunamadı.';
        }
    }
</script>
</body>
</html>
